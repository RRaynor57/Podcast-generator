name: "Podcast Generator"
author: "Richard Raynor"
description: esription: "Generates a feed for a podcast from a YAML file"
runs:
  using: "docker"
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "red"
inputs:
  email:
    Desription: the commiter's email
    required: true
    default: ${{ github.actor }}@localhost
  name:
    Desription: the commiter's name
    required: true
    default: ${{ github.actor}}
